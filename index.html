<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* ================================================================
         DARK THEME (default)
         ================================================================ */
      [data-theme="dark"] {
        --bg-primary: #09090b;
        --bg-secondary: #12121a;
        --bg-tertiary: #1a1a24;
        --bg-elevated: #22222e;
        --bg-hover: #2a2a38;
        --bg-active: #323244;

        --text-primary: #f4f4f5;
        --text-secondary: #a1a1aa;
        --text-tertiary: #71717a;
        --text-muted: #52525b;

        --accent-primary: #f59e0b;
        --accent-secondary: #fbbf24;
        --accent-muted: rgba(245, 158, 11, 0.12);
        --accent-glow: rgba(245, 158, 11, 0.25);

        --border-subtle: rgba(255, 255, 255, 0.05);
        --border-default: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.12);

        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.5);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.5);
        --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.6);

        --glow-accent: 0 0 30px rgba(245, 158, 11, 0.2);

        --surface-gradient: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 100%);
      }

      /* ================================================================
         LIGHT THEME
         ================================================================ */
      [data-theme="light"] {
        --bg-primary: #fafaf9;
        --bg-secondary: #f5f5f4;
        --bg-tertiary: #e7e5e4;
        --bg-elevated: #ffffff;
        --bg-hover: #e4e4e7;
        --bg-active: #d4d4d8;

        --text-primary: #18181b;
        --text-secondary: #52525b;
        --text-tertiary: #a1a1aa;
        --text-muted: #c4c4c8;

        --accent-primary: #d97706;
        --accent-secondary: #f59e0b;
        --accent-muted: rgba(217, 119, 6, 0.10);
        --accent-glow: rgba(217, 119, 6, 0.15);

        --border-subtle: rgba(0, 0, 0, 0.06);
        --border-default: rgba(0, 0, 0, 0.1);
        --border-strong: rgba(0, 0, 0, 0.15);

        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.1);

        --glow-accent: 0 0 30px rgba(217, 119, 6, 0.12);

        --surface-gradient: linear-gradient(180deg, rgba(0,0,0,0.02) 0%, rgba(0,0,0,0) 100%);
      }

      /* ================================================================
         COMMON VARIABLES
         ================================================================ */
      :root {
        --font-display: 'Bricolage Grotesque', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;

        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
        --radius-xl: 20px;

        --transition-fast: 120ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-normal: 220ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      body {
        font-family: var(--font-body);
        background: var(--bg-primary);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow: hidden;
        transition: background var(--transition-slow), color var(--transition-slow);
      }

      #app {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: relative;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted);
      }

      /* Selection */
      ::selection {
        background: var(--accent-muted);
        color: var(--accent-primary);
      }

      /* Focus */
      *:focus-visible {
        outline: 2px solid var(--accent-primary);
        outline-offset: 2px;
        border-radius: 2px;
      }
    </style>
    <script>
      // 初始化主题：优先使用 localStorage，其次系统偏好
      (function() {
        var saved = localStorage.getItem('workspace-config');
        var theme = 'dark';
        if (saved) {
          try {
            var cfg = JSON.parse(saved);
            if (cfg.theme) theme = cfg.theme;
          } catch(e) {}
        }
        if (theme === 'auto') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* ================================================================
         DARK THEME (default)
         ================================================================ */
      [data-theme="dark"] {
        --bg-primary: #1C1917;
        --bg-secondary: #292524;
        --bg-tertiary: #44403C;
        --bg-elevated: #57534E;
        --bg-hover: #57534E;
        --bg-active: #78716C;

        --text-primary: #FAFAF9;
        --text-secondary: #A8A29E;
        --text-tertiary: #78716C;
        --text-muted: #57534E;

        --accent-primary: #B45309;
        --accent-secondary: #D97706;
        --accent-muted: rgba(180, 83, 9, 0.12);
        --accent-glow: rgba(180, 83, 9, 0.25);

        --border-subtle: rgba(255, 245, 235, 0.06);
        --border-default: rgba(255, 245, 235, 0.10);
        --border-strong: rgba(255, 245, 235, 0.15);

        --shadow-sm: 0 1px 3px rgba(28, 25, 23, 0.4);
        --shadow-md: 0 4px 16px rgba(28, 25, 23, 0.5);
        --shadow-lg: 0 12px 40px rgba(28, 25, 23, 0.6);

        --glow-accent: 0 0 30px rgba(180, 83, 9, 0.2);

        --surface-gradient: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 100%);
      }

      /* ================================================================
         LIGHT THEME
         ================================================================ */
      [data-theme="light"] {
        --bg-primary: #F5F0EB;
        --bg-secondary: #FFFCF8;
        --bg-tertiary: #FAF6F1;
        --bg-elevated: #FFFFFF;
        --bg-hover: #EDE8E2;
        --bg-active: #E7E2DC;

        --text-primary: #292524;
        --text-secondary: #57534E;
        --text-tertiary: #A8A29E;
        --text-muted: #D6D0C9;

        --accent-primary: #B45309;
        --accent-secondary: #D97706;
        --accent-muted: rgba(180, 83, 9, 0.10);
        --accent-glow: rgba(180, 83, 9, 0.15);

        --border-subtle: rgba(60, 40, 30, 0.06);
        --border-default: rgba(60, 40, 30, 0.10);
        --border-strong: rgba(60, 40, 30, 0.15);

        --shadow-sm: 0 1px 3px rgba(60, 40, 30, 0.06);
        --shadow-md: 0 4px 16px rgba(60, 40, 30, 0.08);
        --shadow-lg: 0 12px 40px rgba(60, 40, 30, 0.10);

        --glow-accent: 0 0 30px rgba(180, 83, 9, 0.12);

        --surface-gradient: linear-gradient(180deg, rgba(0,0,0,0.02) 0%, rgba(0,0,0,0) 100%);
      }

      /* ================================================================
         COMMON VARIABLES
         ================================================================ */
      :root {
        --font-display: 'Bricolage Grotesque', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;

        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-xl: 24px;

        --transition-fast: 120ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-normal: 220ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      body {
        font-family: var(--font-body);
        background: var(--bg-primary);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow: hidden;
        transition: background var(--transition-slow), color var(--transition-slow);
      }

      #app {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: relative;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-strong);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted);
      }

      /* Selection */
      ::selection {
        background: var(--accent-muted);
        color: var(--accent-primary);
      }

      /* Focus */
      *:focus-visible {
        outline: 2px solid var(--accent-primary);
        outline-offset: 2px;
        border-radius: 2px;
      }
    </style>
    <script>
      // 初始化主题：优先使用 localStorage，其次系统偏好
      (function() {
        var saved = localStorage.getItem('workspace-config');
        var theme = 'dark';
        if (saved) {
          try {
            var cfg = JSON.parse(saved);
            if (cfg.theme) theme = cfg.theme;
          } catch(e) {}
        }
        if (theme === 'auto') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
